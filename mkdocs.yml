site_name: VibeReader
site_description: A local-first EPUB reader built as a nostr-ecosystem app
site_url: https://plebeiusgaragicus.github.io/vibereader/docs/
repo_url: https://github.com/PlebeiusGaragicus/vibereader
repo_name: vibereader

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Philosophy: PHILOSOPHY.md
  - Architecture: architecture.md
  - Nostr Event Model: nostr-event-model.md
  - Development: development.md
