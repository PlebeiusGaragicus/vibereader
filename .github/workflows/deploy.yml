name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # cyphertap is consumed from source as a submodule
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static SPA
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm build
      # Docs ship inside the same Pages artifact at /docs/. Pages serves real
      # files before the 404.html SPA fallback, so the paths never collide.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r docs-requirements.txt
      - name: Build docs into the artifact
        run: mkdocs build --strict -d build/docs
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
